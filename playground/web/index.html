<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sprout — playground</title>
<meta name="description" content="An in-browser IDE for Sprout, a small from-scratch language. Edit and run Sprout code live via WebAssembly." />
<style>
  :root{
    --bg:#1e1f22; --panel:#2b2d30; --panel-hi:#393b40; --editor:#1e1f22; --line:#1e1f22;
    --border:#1e1f22; --divider:#393b40; --ink:#bcbec4; --dim:#868a91; --dimmer:#5a5d63;
    --sel:#2e436e; --hover:#34373b; --green:#5fb865; --green2:#3f9a4a; --blue:#3573f0;
    --kw:#cf8e6d; --str:#6aab73; --num:#2aacb8; --com:#7a7e85; --fn:#c9a26d; --warn:#f2c55c;
    --mono:'JetBrains Mono','SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace;
    --sans:'Inter',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
    --gutter:52px; --activity:44px; --project:248px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden;background:var(--bg);color:var(--ink);
    font-family:var(--sans);font-size:13px}
  .ide{display:grid;grid-template-rows:30px 40px 1fr 24px;height:100vh}
  svg{display:block} .ico{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.5}
  .ico.fill{fill:currentColor;stroke:none}
  button{font:inherit;color:inherit;background:none;border:0;cursor:pointer;display:inline-flex;
    align-items:center;gap:6px;border-radius:6px;padding:5px 7px}
  button:hover{background:var(--hover)}

  /* ---- title bar ---- */
  .titlebar{display:flex;align-items:center;justify-content:center;position:relative;
    background:var(--panel);border-bottom:1px solid var(--bg);color:var(--dim);font-size:12.5px;user-select:none}
  .titlebar b{color:var(--ink);font-weight:500}
  .titlebar .close{position:absolute;right:8px;top:50%;transform:translateY(-50%);color:var(--dim);
    width:24px;height:24px;border-radius:6px;display:grid;place-items:center}
  .titlebar .close:hover{background:#c0392b;color:#fff}

  /* ---- toolbar ---- */
  .toolbar{display:flex;align-items:center;gap:4px;padding:0 8px;background:var(--panel);
    border-bottom:1px solid var(--bg);user-select:none}
  .toolbar .spacer{flex:1}
  .widget{display:inline-flex;align-items:center;gap:7px;padding:5px 8px;border-radius:7px;color:var(--ink)}
  .widget:hover{background:var(--hover)} .widget .chev{color:var(--dim)}
  .proj-badge{width:18px;height:18px;border-radius:5px;background:linear-gradient(135deg,#5fb865,#2f8f53);
    display:grid;place-items:center;font-size:12px}
  .runbtn{color:var(--green)} .runbtn:hover{background:rgba(95,184,101,.16)}
  .runbtn .ico{stroke:none;fill:var(--green)}
  .iconbtn{color:var(--dim);padding:6px;border-radius:7px} .iconbtn:hover{color:var(--ink)}
  .chip{font-size:11px;color:var(--dim);padding:3px 9px;border:1px solid var(--divider);border-radius:7px}

  /* ---- main row ---- */
  .main{display:grid;grid-template-columns:var(--activity) var(--project) 1fr;min-height:0}
  .activity{background:var(--panel);border-right:1px solid var(--bg);display:flex;
    flex-direction:column;align-items:center;padding:8px 0;gap:4px}
  .activity .a{width:30px;height:30px;border-radius:7px;display:grid;place-items:center;color:var(--dim);position:relative}
  .activity .a:hover{background:var(--hover);color:var(--ink)}
  .activity .a.on{color:var(--ink)} .activity .a.on::before{content:"";position:absolute;left:-8px;
    top:6px;bottom:6px;width:2px;border-radius:2px;background:var(--ink)}
  .activity .grow{flex:1}

  /* ---- project panel ---- */
  .project{background:var(--panel);border-right:1px solid var(--bg);display:flex;flex-direction:column;min-height:0}
  .ph{display:flex;align-items:center;gap:6px;padding:9px 12px;color:var(--ink);font-weight:600;
    font-size:12px}
  .ph .chev{color:var(--dim)} .ph .grow{flex:1}
  .tree{overflow:auto;padding:2px 4px 10px;flex:1;user-select:none}
  .row{display:flex;align-items:center;gap:5px;padding:3px 6px;border-radius:6px;color:var(--ink);
    cursor:pointer;white-space:nowrap;font-size:13px}
  .row:hover{background:var(--hover)} .row.sel{background:var(--sel)}
  .row .tw{width:14px;color:var(--dim);display:inline-flex;justify-content:center}
  .row .leaf{font:600 10px var(--mono);width:16px;height:16px;border-radius:4px;display:grid;
    place-items:center;color:#0d160f;background:#5fb865;flex:none}
  .row .leaf.doc{background:#5b6168;color:#dfe2e6}

  /* ---- editor column ---- */
  .ecol{display:grid;grid-template-rows:35px 1fr 0fr;min-width:0;min-height:0;background:var(--editor)}
  .ecol.show-run{grid-template-rows:35px 1fr 190px}
  .tabs{display:flex;align-items:stretch;background:var(--panel);border-bottom:1px solid var(--bg)}
  .tab{display:flex;align-items:center;gap:8px;padding:0 12px;font-size:13px;color:var(--dim);
    background:var(--panel);border-right:1px solid var(--bg);cursor:default}
  .tab.on{color:var(--ink);background:var(--editor);box-shadow:inset 0 -2px 0 var(--blue)}
  .tab .x{color:var(--dimmer);border-radius:4px;width:18px;height:18px;display:grid;place-items:center}
  .tab .x:hover{background:var(--hover);color:var(--ink)}
  .editwrap{position:relative;min-height:0;overflow:hidden}
  .insp{position:absolute;top:6px;right:18px;z-index:5;display:flex;align-items:center;gap:4px;
    color:var(--dim);font-size:11px;background:rgba(43,45,48,.7);border-radius:7px;padding:2px 6px}
  .insp .w{color:var(--warn)}
  .editor{position:absolute;inset:0;display:flex;font-family:var(--mono);font-size:13.5px;line-height:20px;overflow:auto}
  .gutter{flex:none;width:var(--gutter);padding:8px 0;text-align:right;color:var(--dimmer);
    user-select:none;position:relative}
  .gutter .ln{padding-right:10px} .gutter .ln.cur{color:var(--dim)}
  .gutter .play{position:absolute;left:6px;top:8px;width:18px;height:20px;display:grid;place-items:center;
    color:var(--green);cursor:pointer;border-radius:4px}
  .gutter .play:hover{background:rgba(95,184,101,.16)}
  .codewrap{position:relative;flex:1;padding:8px 0}
  .codewrap pre,.codewrap textarea{margin:0;padding:0 16px;font:inherit;line-height:20px;
    white-space:pre;tab-size:4;border:0;background:transparent}
  .codewrap pre{position:absolute;inset:0;padding-top:8px;color:var(--ink);pointer-events:none;overflow:visible}
  .codewrap textarea{position:relative;width:100%;height:100%;color:transparent;caret-color:#cdd1d8;
    resize:none;outline:none;overflow:hidden}
  .codewrap textarea::selection{background:rgba(60,116,200,.40)}
  .codewrap textarea::-moz-selection{background:rgba(60,116,200,.40)}
  .c-kw{color:var(--kw)} .c-str{color:var(--str)} .c-num{color:var(--num)}
  .c-com{color:var(--com);font-style:italic} .c-fn{color:var(--fn)} .c-lit{color:var(--kw)}

  /* autocomplete popup (VS Code style) */
  .acpop{position:absolute;z-index:50;min-width:240px;max-width:460px;max-height:228px;overflow-y:auto;
    background:#2b2d30;border:1px solid #43454a;border-radius:7px;box-shadow:0 10px 28px rgba(0,0,0,.55);
    padding:4px;display:none}
  .acpop.on{display:block}
  .acrow{display:flex;align-items:center;gap:8px;padding:4px 8px;border-radius:5px;color:var(--ink);
    cursor:pointer;white-space:nowrap;font-family:var(--mono);font-size:13px}
  .acrow.sel{background:var(--sel)}
  .ackind{width:16px;height:16px;border-radius:3px;display:grid;place-items:center;font:700 10px var(--mono);
    color:#10180f;flex:none}
  .ackind.kw{background:var(--kw)} .ackind.fn{background:var(--fn)} .ackind.lit{background:var(--kw)} .ackind.vr{background:#57aaf7}
  .aclabel{color:var(--ink)} .acdetail{color:var(--dim);font-size:12px;margin-left:auto;padding-left:18px}

  /* ---- run console ---- */
  .runpane{background:var(--bg);border-top:1px solid var(--divider);display:flex;flex-direction:column;min-height:0}
  .rh{display:flex;align-items:center;gap:8px;padding:5px 10px;color:var(--dim);font-size:12px;
    border-bottom:1px solid var(--divider)}
  .rh .dot{color:var(--green)} .rh b{color:var(--ink);font-weight:500} .rh .grow{flex:1}
  .rh .x:hover{color:var(--ink)}
  .console{flex:1;overflow:auto;padding:8px 12px;font-family:var(--mono);font-size:13px;line-height:1.55;
    white-space:pre-wrap;word-break:break-word;color:#cdd1d8}
  .console .muted{color:var(--dim)} .console .err{color:#f2755c} .console .ok{color:var(--green)}

  /* ---- status bar ---- */
  .status{display:flex;align-items:center;gap:14px;padding:0 12px;background:var(--panel);
    border-top:1px solid var(--bg);color:var(--dim);font-size:12px;user-select:none}
  .status .crumbs{flex:1;display:flex;align-items:center;gap:5px;overflow:hidden}
  .status .crumbs span{color:var(--dim)} .status .crumbs b{color:var(--ink);font-weight:400}
  .status .sep{color:var(--dimmer)} .status .s{white-space:nowrap}
  .status .s:hover{color:var(--ink);cursor:default}
</style>
</head>
<body>
<div class="ide">

  <!-- title bar -->
  <div class="titlebar"><span>Sprout&nbsp;–&nbsp;<b id="title">hello.sprout</b>&nbsp;[playground]</span>
    <a class="close" href="https://github.com/fizzexual/Sprout" title="Sprout on GitHub"><svg class="ico" viewBox="0 0 16 16"><path d="M4 4l8 8M12 4l-8 8"/></svg></a>
  </div>

  <!-- toolbar -->
  <div class="toolbar">
    <button class="iconbtn" title="Menu"><svg class="ico" viewBox="0 0 16 16"><path d="M2 4h12M2 8h12M2 12h12"/></svg></button>
    <button class="widget"><span class="proj-badge">🌱</span>Sprout<svg class="ico chev" viewBox="0 0 16 16" width="12" height="12"><path d="M4 6l4 4 4-4"/></svg></button>
    <button class="widget"><svg class="ico" viewBox="0 0 16 16" width="14" height="14"><path d="M5 3v7M5 10a2 2 0 100 0M11 6a2 2 0 100 0M11 6c0 3-6 1-6 4"/></svg>main<svg class="ico chev" viewBox="0 0 16 16" width="12" height="12"><path d="M4 6l4 4 4-4"/></svg></button>
    <div class="spacer"></div>
    <button class="widget"><span style="color:var(--dim)">Current File</span><svg class="ico chev" viewBox="0 0 16 16" width="12" height="12"><path d="M4 6l4 4 4-4"/></svg></button>
    <button class="runbtn" id="runTop" title="Run (Ctrl+Enter)"><svg class="ico" viewBox="0 0 16 16"><path d="M4 3l9 5-9 5z"/></svg></button>
    <button class="iconbtn" title="Debug"><svg class="ico" viewBox="0 0 16 16"><path d="M5 6a3 3 0 016 0v3a3 3 0 01-6 0zM2 7h3M11 7h3M2 11h3M11 11h3M8 3v1"/></svg></button>
    <button class="iconbtn"><svg class="ico fill" viewBox="0 0 16 16" width="4" height="16"><circle cx="2" cy="3" r="1.4"/><circle cx="2" cy="8" r="1.4"/><circle cx="2" cy="13" r="1.4"/></svg></button>
    <button class="iconbtn" title="Search"><svg class="ico" viewBox="0 0 16 16"><circle cx="7" cy="7" r="4.5"/><path d="M11 11l3 3"/></svg></button>
    <button class="iconbtn" title="Settings"><svg class="ico" viewBox="0 0 16 16"><circle cx="8" cy="8" r="2.3"/><path d="M8 1.5v2M8 12.5v2M1.5 8h2M12.5 8h2M3.5 3.5l1.4 1.4M11.1 11.1l1.4 1.4M3.5 12.5l1.4-1.4M11.1 4.9l1.4-1.4"/></svg></button>
  </div>

  <!-- main -->
  <div class="main">
    <div class="activity">
      <div class="a on" title="Project"><svg class="ico" viewBox="0 0 16 16"><path d="M2 4a1 1 0 011-1h3l1.5 1.5H13a1 1 0 011 1V12a1 1 0 01-1 1H3a1 1 0 01-1-1z"/></svg></div>
      <div class="a" title="Commit"><svg class="ico" viewBox="0 0 16 16"><circle cx="8" cy="8" r="2.5"/><path d="M2 8h3.5M10.5 8H14"/></svg></div>
      <div class="a" title="Structure"><svg class="ico" viewBox="0 0 16 16"><path d="M3 3h4v4H3zM9 9h4v4H9zM5 7v4h4"/></svg></div>
      <div class="a" title="More"><svg class="ico fill" viewBox="0 0 16 16"><circle cx="3" cy="8" r="1.4"/><circle cx="8" cy="8" r="1.4"/><circle cx="13" cy="8" r="1.4"/></svg></div>
      <div class="grow"></div>
      <div class="a" title="Terminal"><svg class="ico" viewBox="0 0 16 16"><path d="M3 4l3 3-3 3M8 11h5"/></svg></div>
      <div class="a" title="Problems"><svg class="ico" viewBox="0 0 16 16"><path d="M8 2l6 11H2zM8 7v3M8 11.5v.5"/></svg></div>
    </div>

    <div class="project">
      <div class="ph"><span>Project</span><svg class="ico chev" viewBox="0 0 16 16" width="12" height="12"><path d="M4 6l4 4 4-4"/></svg><span class="grow"></span></div>
      <div class="tree" id="tree"></div>
    </div>

    <div class="ecol" id="ecol">
      <div class="tabs">
        <div class="tab on"><span class="leaf" style="width:14px;height:14px;font-size:9px">S</span><span id="tabName">hello.sprout</span><span class="x" id="tabX"><svg class="ico" viewBox="0 0 16 16" width="11" height="11"><path d="M4 4l8 8M12 4l-8 8"/></svg></span></div>
      </div>
      <div class="editwrap">
        <div class="insp"><span class="w">●</span><span id="inspText">ready</span></div>
        <div class="editor" id="editor">
          <div class="gutter" id="gutter"><div class="play" id="runGutter" title="Run this file"><svg class="ico" viewBox="0 0 16 16" width="13" height="13" style="fill:currentColor;stroke:none"><path d="M4 3l9 5-9 5z"/></svg></div></div>
          <div class="codewrap">
            <pre aria-hidden="true"><code id="hl"></code></pre>
            <textarea id="code" spellcheck="false" autocapitalize="off" autocomplete="off" wrap="off"></textarea>
          </div>
        </div>
        <div class="acpop" id="acpop"></div>
      </div>
      <div class="runpane" id="runpane">
        <div class="rh"><span class="dot"><svg class="ico" viewBox="0 0 16 16" width="12" height="12" style="fill:currentColor;stroke:none"><path d="M4 3l9 5-9 5z"/></svg></span>Run:&nbsp;<b id="runName">hello.sprout</b><span class="grow"></span><button class="iconbtn x" id="runClose" title="Hide"><svg class="ico" viewBox="0 0 16 16" width="12" height="12"><path d="M4 4l8 8M12 4l-8 8"/></svg></button></div>
        <div class="console" id="console"></div>
      </div>
    </div>
  </div>

  <!-- status bar -->
  <div class="status">
    <div class="crumbs"><span>Sprout</span><span class="sep">›</span><span>examples</span><span class="sep">›</span><b id="crumbFile">hello.sprout</b></div>
    <span class="s" id="lncol">1:1</span>
    <span class="s">LF</span>
    <span class="s">UTF-8</span>
    <span class="s">4 spaces</span>
    <span class="s" id="wasmState" style="color:var(--dimmer)">WASM…</span>
  </div>
</div>

<script>
const EXAMPLES = [
  ["hello.sprout",
`~ Welcome to the Sprout playground!
~ Press the green play (or Ctrl+Enter) to run.
make name = "world"
show "Hello, " + name + "!"
show "2 + 2 =", 2 + 2
show f"Sprout is {3 * 14}% fun"`],

  ["fizzbuzz.sprout",
`for each i in range(1, 21):
    when i % 15 == 0:
        show "FizzBuzz"
    orwhen i % 3 == 0:
        show "Fizz"
    orwhen i % 5 == 0:
        show "Buzz"
    otherwise:
        show i`],

  ["types.sprout",
`type Animal:
    make name = "?"
    task speak(self):
        give self.name + " makes a sound"

type Dog from Animal:
    task speak(self):
        give super.speak() + " (woof)"

show Dog("Rex").speak()
show "is a Dog an Animal? ", is_a(Dog("Rex"), "Animal")`],

  ["pipeline.sprout",
`make sales = [
    {who: "Ada", amt: 120}, {who: "Lin", amt: 80},
    {who: "Ada", amt: 200}, {who: "Lin", amt: 300},
]
show "total:", sum(map(sales, task(s): s["amt"]))
make by = group_by(sales, task(s): s["who"])
for each who, rows in by:
    show who, "->", sum(map(rows, task(r): r["amt"]))`],

  ["regex.sprout",
`make log = "2026-06-24  GET /home  200"
make c = captures(log, "([0-9]+)-([0-9]+)-([0-9]+)")
show "year:", c[1], " month:", c[2], " day:", c[3]
show "numbers:", find_all(log, "[0-9]+")`],

  ["closures.sprout",
`task fib(n):
    when n < 2:
        give n
    give fib(n - 1) + fib(n - 2)
show "fib(20) =", fib(20)

~ a closure that captures x
task adder(x):
    give task(y): x + y
make add10 = adder(10)
show "add10(5) =", add10(5)`],

  ["errors.sprout",
`task classify(v):
    match v:
        is [a, b]:
            give f"a pair: {a}, {b}"
        is 0:
            give "zero"
        otherwise:
            give "something else"
show classify([1, 2])
show classify(0)

try:
    show 1 / 0
caught e:
    show "caught a", e["kind"], "error:", e["message"]`],
];

const KW = new Set(['make','set','show','when','orwhen','otherwise','for','each','in','repeat','while','task','give','type','from','match','is','try','caught','fail','use','and','or','not','stop','skip','public','private','to','learn','test','expect','self']);
const LIT = new Set(['yes','no','nothing']);
const FN = new Set(['range','length','add','remove','insert','sort','sort_by','reverse','index_of','map','filter','reduce','group_by','min_by','max_by','partition','chunk','sum','count','unique','zip','flatten','slice','keys','values','contains','first','last','copy','kind_of','is_a','round','format','floor','ceil','abs','sqrt','pow','min','max','clamp','sign','random','seed','number','is_number','sin','cos','tan','log','exp','pi','upper','lower','trim','replace','split','join','starts_with','ends_with','words','lines','title','pad_start','pad_end','code','char','matches','find','find_all','captures','ask','args','env','exit','now','today','time']);

const $ = id => document.getElementById(id);
const code = $('code'), hl = $('hl'), gutter = $('gutter'), runGutter = $('runGutter');
const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

function highlight(src){
  const re=/(~[^\n]*)|(f?"(?:[^"\\]|\\.)*")|(\b\d[\d_]*(?:\.\d+)?\b)|([A-Za-z_]\w*)/g;
  let out='', last=0, m;
  while((m=re.exec(src))){
    out += esc(src.slice(last,m.index));
    const t=m[0]; let cls=null;
    if(m[1])cls='c-com'; else if(m[2])cls='c-str'; else if(m[3])cls='c-num';
    else if(m[4]){ if(KW.has(t))cls='c-kw'; else if(LIT.has(t))cls='c-lit'; else if(FN.has(t))cls='c-fn'; }
    out += cls ? `<span class="${cls}">${esc(t)}</span>` : esc(t);
    last = m.index + t.length;
  }
  out += esc(src.slice(last));
  return out + '\n';
}

let curLine = 1;
function renderGutter(){
  const lines = code.value.split('\n').length;
  let html = '<div class="play" id="runGutter" title="Run this file"><svg viewBox="0 0 16 16" width="13" height="13" style="fill:currentColor;stroke:none"><path d="M4 3l9 5-9 5z"/></svg></div>';
  for(let i=1;i<=lines;i++) html += `<div class="ln${i===curLine?' cur':''}">${i}</div>`;
  gutter.innerHTML = html;
  $('runGutter').onclick = run;
}
function updateCaret(){
  const before = code.value.slice(0, code.selectionStart);
  const ln = before.split('\n'); curLine = ln.length;
  $('lncol').textContent = ln.length + ':' + (ln[ln.length-1].length + 1);
}
function sync(){ hl.innerHTML = highlight(code.value); renderGutter(); }
function onEdit(){ sync(); }

/* ---------- autocomplete (VS Code style) ---------- */
const pop = $('acpop');
const SIG = {range:'range(n) / range(a, b)',length:'length(x)',map:'map(list, task)',filter:'filter(list, task)',
  reduce:'reduce(list, task, start)',group_by:'group_by(list, key)',min_by:'min_by(list, key)',max_by:'max_by(list, key)',
  partition:'partition(list, test)',chunk:'chunk(list, size)',sum:'sum(list)',count:'count(coll, x)',unique:'unique(list)',
  zip:'zip(a, b)',flatten:'flatten(list)',slice:'slice(x, start, end)',sort:'sort(list)',sort_by:'sort_by(list, key)',
  reverse:'reverse(list)',add:'add(list, value)',remove:'remove(coll, key)',insert:'insert(list, i, value)',index_of:'index_of(x, item)',
  keys:'keys(map)',values:'values(map)',contains:'contains(coll, x)',first:'first(list)',last:'last(list)',copy:'copy(x)',
  round:'round(x [, places])',format:'format(n, places)',floor:'floor(n)',ceil:'ceil(n)',abs:'abs(n)',sqrt:'sqrt(n)',
  pow:'pow(base, exp)',min:'min(...)',max:'max(...)',clamp:'clamp(x, lo, hi)',sign:'sign(n)',random:'random() / random(a, b)',
  number:'number(text)',is_number:'is_number(text)',kind_of:'kind_of(x)',is_a:'is_a(obj, "Type")',upper:'upper(t)',lower:'lower(t)',
  trim:'trim(t)',title:'title(t)',replace:'replace(t, a, b)',split:'split(text, sep)',join:'join(list, sep)',words:'words(t)',
  lines:'lines(t)',starts_with:'starts_with(t, p)',ends_with:'ends_with(t, s)',pad_start:'pad_start(text, width [, fill])',
  pad_end:'pad_end(text, width [, fill])',code:'code(char)',char:'char(n)',matches:'matches(text, pattern)',find:'find(text, pattern)',
  find_all:'find_all(text, pattern)',captures:'captures(text, pattern)',ask:'ask(prompt)',args:'args()',env:'env(name [, default])',exit:'exit([code])'};
const STATIC_AC = [
  ...[...KW].map(l=>({label:l,kind:'kw',detail:'keyword'})),
  ...[...LIT].map(l=>({label:l,kind:'lit',detail:'value'})),
  ...[...FN].map(l=>({label:l,kind:'fn',detail:SIG[l]||'builtin'})),
];
const GLYPH = {kw:'K',fn:'ƒ',lit:'V',vr:'v'};
let _cw=0;
function charW(){ if(_cw)return _cw; const s=document.createElement('span');
  s.style.cssText='position:absolute;visibility:hidden;white-space:pre;font-family:var(--mono);font-size:13.5px';
  s.textContent='0'.repeat(20); document.body.appendChild(s); _cw=s.getBoundingClientRect().width/20; s.remove(); return _cw; }
function dynAC(){ const ws=code.value.match(/[A-Za-z_]\w*/g)||[], seen=new Set(), out=[];
  for(const w of ws){ if(seen.has(w)){continue;} seen.add(w); if(w.length<2||KW.has(w)||LIT.has(w)||FN.has(w))continue; out.push({label:w,kind:'vr',detail:'in this file'}); } return out; }
function curWord(){ const v=code.value,p=code.selectionStart; let s=p; while(s>0&&/\w/.test(v[s-1]))s--; return {word:v.slice(s,p),start:s,end:p}; }
let acItems=[], acSel=0;
function hideAC(){ pop.classList.remove('on'); acItems=[]; }
function renderAC(){
  pop.innerHTML = acItems.map((c,i)=>`<div class="acrow${i===acSel?' sel':''}" data-i="${i}"><span class="ackind ${c.kind}">${GLYPH[c.kind]}</span><span class="aclabel">${esc(c.label)}</span><span class="acdetail">${esc(c.detail)}</span></div>`).join('');
  pop.querySelectorAll('.acrow').forEach(r=>r.addEventListener('mousedown',e=>{ e.preventDefault(); acSel=+r.dataset.i; acceptAC(); }));
  const sr=pop.querySelector('.acrow.sel'); if(sr) sr.scrollIntoView({block:'nearest'});
}
function positionAC(){
  const {start}=curWord(), before=code.value.slice(0,start), ls=before.split('\n');
  const line=ls.length-1, col=ls[ls.length-1].length, gw=gutter.getBoundingClientRect().width;
  const x=Math.max(4, gw+16+col*charW()-code.scrollLeft), y=8+(line+1)*20-code.scrollTop;
  const wrapH=pop.parentElement.getBoundingClientRect().height, popH=Math.min(228, acItems.length*23+8);
  pop.style.left=x+'px'; pop.style.top=((y+popH>wrapH)? Math.max(4,y-20-popH) : y)+'px';
}
function updateAC(){
  const {word}=curWord(); if(word.length<1){ hideAC(); return; }
  const wl=word.toLowerCase();
  acItems=STATIC_AC.concat(dynAC()).filter(c=>c.label.toLowerCase().startsWith(wl)&&c.label!==word)
    .sort((a,b)=>a.label.length-b.label.length||a.label.localeCompare(b.label)).slice(0,30);
  if(!acItems.length){ hideAC(); return; }
  acSel=0; renderAC(); positionAC(); pop.classList.add('on');
}
function acceptAC(){
  const c=acItems[acSel]; if(!c){ hideAC(); return; }
  const {start,end}=curWord(), v=code.value;
  code.value=v.slice(0,start)+c.label+v.slice(end);
  code.selectionStart=code.selectionEnd=start+c.label.length;
  hideAC(); updateCaret(); sync(); code.focus();
}

code.addEventListener('input', ()=>{ updateCaret(); onEdit(); updateAC(); });
code.addEventListener('keyup', e=>{ if(['ArrowLeft','ArrowRight','Home','End'].includes(e.key)) hideAC(); updateCaret(); });
code.addEventListener('click', ()=>{ hideAC(); updateCaret(); });
code.addEventListener('blur', ()=>setTimeout(hideAC,150));
code.addEventListener('scroll', ()=>{ hl.parentElement.scrollTop=code.scrollTop; hl.parentElement.scrollLeft=code.scrollLeft; if(pop.classList.contains('on')) positionAC(); });
code.addEventListener('keydown', e=>{
  if(pop.classList.contains('on')){
    if(e.key==='ArrowDown'){ e.preventDefault(); acSel=(acSel+1)%acItems.length; renderAC(); return; }
    if(e.key==='ArrowUp'){ e.preventDefault(); acSel=(acSel-1+acItems.length)%acItems.length; renderAC(); return; }
    if(e.key==='Enter'||e.key==='Tab'){ e.preventDefault(); acceptAC(); return; }
    if(e.key==='Escape'){ e.preventDefault(); hideAC(); return; }
  }
  if(e.ctrlKey&&e.key===' '){ e.preventDefault(); updateAC(); return; }   // Ctrl+Space to trigger
  if(e.key==='Tab'){ e.preventDefault(); const s=code.selectionStart,en=code.selectionEnd;
    code.value=code.value.slice(0,s)+'    '+code.value.slice(en); code.selectionStart=code.selectionEnd=s+4; updateCaret(); onEdit(); return; }
  if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){ e.preventDefault(); run(); return; }
});

// file tree
function buildTree(){
  const t=$('tree');
  let html='<div class="row"><span class="tw">▾</span><span class="leaf">S</span>&nbsp;Sprout playground</div>';
  html+='<div class="row" style="padding-left:22px"><span class="tw">▾</span><svg class="ico" viewBox="0 0 16 16" width="14" height="14" style="color:var(--fn)"><path d="M2 4a1 1 0 011-1h3l1.5 1.5H13a1 1 0 011 1V12a1 1 0 01-1 1H3a1 1 0 01-1-1z"/></svg>&nbsp;examples</div>';
  EXAMPLES.forEach((ex,i)=>{ html+=`<div class="row file${i===0?' sel':''}" data-i="${i}" style="padding-left:40px"><span class="tw"></span><span class="leaf">S</span>&nbsp;${ex[0]}</div>`; });
  html+='<div class="row" style="padding-left:22px"><span class="tw"></span><span class="leaf doc">M</span>&nbsp;README.md</div>';
  t.innerHTML=html;
  t.querySelectorAll('.file').forEach(r=> r.onclick=()=>loadExample(+r.dataset.i, r));
}
function loadExample(i, rowEl){
  const [name,src]=EXAMPLES[i];
  code.value=src; updateCaret(); sync();
  $('tabName').textContent=name; $('title').textContent=name; $('crumbFile').textContent=name; $('runName').textContent=name;
  document.querySelectorAll('.row.sel').forEach(r=>r.classList.remove('sel'));
  if(rowEl) rowEl.classList.add('sel');
  code.focus();
}

// ---- run via WASM ----
const stripAnsi = s => s.replace(/\x1b\[[0-9;]*m/g,'');
let ready=false, tries=0;
(function wait(){ if(typeof createSprout==='function'){ready=true;$('wasmState').textContent='WASM ready';$('inspText').textContent='ready';}
  else if(tries++<40) setTimeout(wait,150);
  else { $('wasmState').textContent='WASM unavailable'; $('inspText').textContent='offline'; } })();

async function run(){
  $('ecol').classList.add('show-run');
  const con=$('console');
  if(!ready){ con.innerHTML='<span class="muted">the WebAssembly interpreter is still loading…</span>'; return; }
  $('inspText').textContent='running…'; con.innerHTML='<span class="muted">running '+$('tabName').textContent+'…</span>';
  let buf='';
  const push=s=>{ buf+=s+'\n'; };
  try{
    const M=await createSprout({print:push,printErr:push,noInitialRun:true});
    M.FS.writeFile('/program.sprout', code.value);
    try{ M.callMain(['/program.sprout','--sandbox']); }
    catch(e){ if(!(e&&(e.name==='ExitStatus'||e.status!==undefined))) push('[runtime error] '+e); }
  }catch(e){ push('[could not start the interpreter] '+e); }
  const text=stripAnsi(buf).replace(/\n+$/,'');
  con.textContent = text.length ? text : '(no output)';
  con.innerHTML += '\n<span class="ok">\nProcess finished.</span>';
  $('inspText').textContent='ready';
}
$('runTop').onclick=run; runGutter.onclick=run;
$('runClose').onclick=()=>$('ecol').classList.remove('show-run');
$('tabX').onclick=()=>{};

buildTree(); loadExample(0, document.querySelector('.row.file')); code.focus();
</script>
<script src="sprout.js"></script>
</body>
</html>
