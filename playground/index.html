<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>🌱 Sprout Playground</title>
<style>
  :root {
    --bg: #0f1410;
    --panel: #161d17;
    --panel2: #1c241d;
    --ink: #e6efe6;
    --muted: #8aa08c;
    --green: #7bd88f;
    --green-dim: #4f9d63;
    --red: #ff7a85;
    --border: #28321f;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    display: flex;
    flex-direction: column;
  }
  header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
  }
  header .brand { font-size: 20px; font-weight: 700; letter-spacing: -0.01em; }
  header .brand span { color: var(--green); }
  header .spacer { flex: 1; }
  select, button {
    font: inherit;
    color: var(--ink);
    background: var(--panel2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    cursor: pointer;
  }
  select:hover, button:hover { border-color: var(--green-dim); }
  button.run {
    background: var(--green);
    color: #08120a;
    font-weight: 700;
    border-color: var(--green);
  }
  button.run:hover { background: #93e6a4; }
  main {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--border);
    min-height: 0;
  }
  .pane { display: flex; flex-direction: column; min-height: 0; background: var(--bg); }
  .pane .label {
    padding: 8px 16px;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    background: var(--panel);
    border-bottom: 1px solid var(--border);
  }
  #editor {
    flex: 1;
    width: 100%;
    resize: none;
    border: 0;
    outline: 0;
    padding: 16px;
    background: var(--bg);
    color: var(--ink);
    font-family: ui-monospace, "Cascadia Code", "JetBrains Mono", Consolas, monospace;
    font-size: 15px;
    line-height: 1.6;
    tab-size: 4;
  }
  #output {
    flex: 1;
    margin: 0;
    padding: 16px;
    overflow: auto;
    font-family: ui-monospace, "Cascadia Code", Consolas, monospace;
    font-size: 14px;
    line-height: 1.55;
    white-space: pre-wrap;
    color: var(--ink);
  }
  #output .err { color: var(--red); }
  #output .hint { color: var(--muted); }
  footer {
    padding: 6px 20px;
    font-size: 12px;
    color: var(--muted);
    border-top: 1px solid var(--border);
    background: var(--panel);
  }
  kbd {
    background: var(--panel2);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 1px 6px;
    font-family: ui-monospace, monospace;
    font-size: 12px;
  }
  @media (max-width: 760px) {
    main { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; }
  }
</style>
</head>
<body>
  <header>
    <div class="brand">🌱 <span>Sprout</span> Playground</div>
    <div class="spacer"></div>
    <select id="examples" title="Load an example">
      <option value="">Examples…</option>
    </select>
    <button class="run" id="runBtn">Run ▶</button>
  </header>

  <main>
    <div class="pane">
      <div class="label">Program</div>
      <textarea id="editor" spellcheck="false" autocomplete="off" autocapitalize="off"></textarea>
    </div>
    <div class="pane">
      <div class="label">Output</div>
      <pre id="output"></pre>
    </div>
  </main>

  <footer>
    Press <kbd>Ctrl</kbd>+<kbd>Enter</kbd> to run &nbsp;·&nbsp; built from scratch, runs on your own machine
  </footer>

<script>
  const EXAMPLES = {
    "Welcome": `~ Welcome to Sprout! Press Run (or Ctrl+Enter).\n\ntask greet(person):\n    give "Hello, " + person + "!"\n\nmake me = "world"\nshow greet(me)\n\nrepeat 3 times:\n    show "🌱"`,
    "FizzBuzz": `make n = 1\nrepeat while n <= 20:\n    when n % 15 == 0:\n        show "FizzBuzz"\n    orwhen n % 3 == 0:\n        show "Fizz"\n    orwhen n % 5 == 0:\n        show "Buzz"\n    otherwise:\n        show n\n    set n = n + 1`,
    "Tasks & recursion": `task factorial(n):\n    when n <= 1:\n        give 1\n    give n * factorial(n - 1)\n\nmake i = 1\nrepeat while i <= 6:\n    show i, "! =", factorial(i)\n    set i = i + 1`,
    "Primes": `show "Primes up to 30:"\nmake n = 2\nrepeat while n <= 30:\n    make isPrime = yes\n    make d = 2\n    repeat while d * d <= n:\n        when n % d == 0:\n            set isPrime = no\n        set d = d + 1\n    when isPrime:\n        show n\n    set n = n + 1`,
    "Triangle": `make row = 1\nrepeat while row <= 6:\n    make stars = ""\n    make i = 0\n    repeat while i < row:\n        set stars = stars + "*"\n        set i = i + 1\n    show stars\n    set row = row + 1`,
  };

  const editor = document.getElementById("editor");
  const output = document.getElementById("output");
  const runBtn = document.getElementById("runBtn");
  const examples = document.getElementById("examples");

  // Fill the examples dropdown.
  for (const name of Object.keys(EXAMPLES)) {
    const opt = document.createElement("option");
    opt.value = name;
    opt.textContent = name;
    examples.appendChild(opt);
  }

  editor.value = EXAMPLES["Welcome"];

  examples.addEventListener("change", () => {
    if (EXAMPLES[examples.value]) {
      editor.value = EXAMPLES[examples.value];
      examples.value = "";
      run();
    }
  });

  // Tab inserts four spaces instead of moving focus.
  editor.addEventListener("keydown", (e) => {
    if (e.key === "Tab") {
      e.preventDefault();
      const s = editor.selectionStart, en = editor.selectionEnd;
      editor.value = editor.value.slice(0, s) + "    " + editor.value.slice(en);
      editor.selectionStart = editor.selectionEnd = s + 4;
    }
    if ((e.ctrlKey || e.metaKey) && e.key === "Enter") {
      e.preventDefault();
      run();
    }
  });

  runBtn.addEventListener("click", run);

  async function run() {
    output.textContent = "Running…";
    try {
      const res = await fetch("/run", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ code: editor.value }),
      });
      const data = await res.json();
      render(data);
    } catch (err) {
      output.textContent = "Couldn't reach the Sprout server. Is it still running?";
    }
  }

  function render(data) {
    output.textContent = "";
    if (data.output) {
      const out = document.createElement("span");
      out.textContent = data.output + (data.error ? "\n\n" : "");
      output.appendChild(out);
    }
    if (data.error) {
      const err = document.createElement("span");
      err.className = "err";
      err.textContent = data.error;
      output.appendChild(err);
    }
    if (!data.output && !data.error) {
      const muted = document.createElement("span");
      muted.className = "hint";
      muted.textContent = "(no output)";
      output.appendChild(muted);
    }
  }

  // Run the welcome program once on load.
  run();
</script>
</body>
</html>
