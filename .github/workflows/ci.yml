name: CI

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  build-test:
    name: build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Build (Linux / macOS)
        if: runner.os != 'Windows'
        run: cc -O2 -Wall -o src/sprout src/sprout.c -lm

      - name: Build (Windows, MinGW)
        if: runner.os == 'Windows'
        run: gcc -O2 -Wall -o src/sprout.exe src/sprout.c -lm -lurlmon

      - name: Version smoke test
        run: |
          bin=src/sprout; [ -f src/sprout.exe ] && bin=src/sprout.exe
          "$bin" version

      - name: Run test suite
        run: bash src/tests/run.sh

  asan:
    name: memory safety (AddressSanitizer, Linux)
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Build with AddressSanitizer
        run: cc -O1 -g -fsanitize=address -fno-omit-frame-pointer -o src/sprout src/sprout.c -lm

      # Sprout intentionally leaks until the GC lands, so leak detection is OFF here.
      # This job guards against the bugs that matter: use-after-free, buffer overflows,
      # bad frees. It is also the safety net the future garbage collector will be built against.
      # detect_stack_use_after_return=0 keeps locals on the REAL C stack. ASan's default
      # "fake stack" relocates them to the heap, where the GC's conservative stack scan
      # can't see them — incompatible with conservative collection (Boehm documents the
      # same). Heap use-after-free / overflow detection (what matters) stays on.
      - name: Run the suite + examples under ASan
        env:
          ASAN_OPTIONS: detect_leaks=0:detect_stack_use_after_return=0:halt_on_error=1:abort_on_error=1
        run: bash src/tests/run.sh

      # The strongest GC check: collect on EVERY statement (so any missing root frees a
      # live object) WHILE AddressSanitizer watches for the resulting use-after-free.
      - name: Run the suite under GC stress + ASan
        env:
          ASAN_OPTIONS: detect_leaks=0:detect_stack_use_after_return=0:halt_on_error=1:abort_on_error=1
          SPROUT_GC_STRESS: "1"
        run: bash src/tests/run.sh

  playground:
    name: playground image (Docker)
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Build the playground image
        run: docker build -f playground/Dockerfile -t sprout-playground .

      - name: Smoke test — safe code runs, dangerous code is blocked
        run: |
          run() { docker run --rm -i --network none --memory 256m --pids-limit 64 \
            --read-only --tmpfs /tmp:size=16m --cap-drop ALL --security-opt no-new-privileges sprout-playground; }
          out="$(echo 'show 2 + 2' | run)"
          echo "safe -> $out"; [ "$out" = "4" ] || { echo "FAIL: safe code did not return 4"; exit 1; }
          for op in 'read("/etc/passwd")' 'write("/x","y")' 'get("http://169.254.169.254/")'; do
            blk="$(printf 'show %s\n' "$op" | run)"
            echo "$op -> $(printf '%s' "$blk" | tr -d '\n' | head -c 80)"
            printf '%s' "$blk" | grep -qi "sandbox mode" || { echo "FAIL: $op was NOT blocked"; exit 1; }
          done
          echo "playground image OK: safe code runs, file/shell/network blocked"

      - name: Web playground (docker compose) — serve, run, block, no temp-file leak
        run: |
          docker compose up -d --build
          # wait for health
          for i in $(seq 1 30); do
            s="$(docker inspect --format '{{.State.Health.Status}}' sprout-playground 2>/dev/null || echo none)"
            [ "$s" = "healthy" ] && break; sleep 2
          done
          [ "$s" = "healthy" ] || { echo "FAIL: web playground never became healthy"; docker compose logs; docker compose down; exit 1; }
          api() { curl -s -X POST --data-binary "$1" http://localhost:8080/run; }
          safe="$(api 'show 6 * 7')"
          echo "safe -> $safe"; printf '%s' "$safe" | grep -q '"output": "42' || { echo "FAIL: web safe run"; docker compose down; exit 1; }
          blk="$(api 'show read("/etc/passwd")')"
          printf '%s' "$blk" | grep -qi "sandbox mode" || { echo "FAIL: web read not blocked"; docker compose down; exit 1; }
          # a big output flood must be capped (not error out) and must not leak temp files
          flood="$(printf 'repeat 200000 times:\n    show "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAA"\n')"
          for n in $(seq 1 6); do api "$flood" > /dev/null; done
          left="$(docker exec sprout-playground sh -c 'ls -1 /tmp | wc -l')"
          echo "temp files in /tmp after 6 floods: $left"
          [ "$left" -eq 0 ] || { echo "FAIL: web playground leaked temp files"; docker compose down; exit 1; }
          still="$(api 'show 1 + 1')"
          printf '%s' "$still" | grep -q '"output": "2' || { echo "FAIL: web server broken after floods"; docker compose down; exit 1; }
          echo "web playground OK: serves, sandboxes, caps output, cleans up temp files"
          docker compose down
