name: Build & release installer

# Builds SproutSetup.exe and publishes it to GitHub Releases. Runs automatically
# when you bump VERSION (or change the installer), and can be run by hand.
on:
  push:
    branches: [main]
    paths:
      - VERSION
      - installer/**
      - .github/workflows/release.yml
  workflow_dispatch:

permissions:
  contents: write   # needed to create the Release

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: ver
        shell: pwsh
        run: "echo \"version=$((Get-Content VERSION -Raw).Trim())\" >> $env:GITHUB_OUTPUT"

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build SproutSetup.exe
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "installer\sprout-setup.iss"
          if ($LASTEXITCODE -ne 0) { throw "Inno Setup compile failed ($LASTEXITCODE)" }

      - name: Publish to Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: Sprout v${{ steps.ver.outputs.version }}
          body: |
            **Sprout v${{ steps.ver.outputs.version }}**

            Download **SproutSetup.exe** below and run it — the wizard installs Sprout,
            lets you pick which libraries you want, downloads the latest source, and
            registers the `sprout` command. Re-run it later to Update / Repair / Uninstall.

            (Needs Node.js 23.6+ installed.)
          files: installer/dist/SproutSetup.exe
          fail_on_unmatched_files: true
